<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RECARGAS GAMES | Oficial</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #000; --card: #0a1120; --accent: #0046be; --blue-light: #0070f3; 
            --text: #fff; --green: #25d366; --gradient: linear-gradient(90deg, #0070f3, #2dd4bf);
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; padding-bottom: 120px; }
        .container { max-width: 450px; margin: 0 auto; position: relative; }
        
        /* Header y Botón de Rayitas */
        header { display: flex; justify-content: center; align-items: center; padding: 20px 0; position: relative; }
        header h1 { font-size: 1.6rem; font-style: italic; margin: 0; cursor: pointer; }
        header h1 span { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        
        .btn-menu-top { position: absolute; right: 0; top: 22px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 5px; }

        .game-selector { display: flex; gap: 10px; margin: 15px 0; }
        .game-btn { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #1e293b; background: var(--card); color: #fff; font-weight: bold; cursor: pointer; }
        .game-btn.active { border-color: var(--blue-light); background: var(--accent); }

        .category-title { color: #9ca3af; font-size: 0.85rem; margin: 20px 0 10px 0; font-weight: bold; text-transform: uppercase; border-left: 3px solid var(--blue-light); padding-left: 10px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #1e293b; cursor: pointer; }
        .card.selected { border-color: var(--blue-light); background: rgba(0, 70, 190, 0.3); }
        .card strong { display: block; font-size: 1rem; }
        .card small { color: #2dd4bf; font-weight: bold; }

        .pago-info { background: #111; padding: 15px; border-radius: 15px; border: 1px dashed var(--accent); margin: 20px 0; font-size: 0.9rem; }
        .copy-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; cursor: pointer; }

        .form-box { background: var(--card); padding: 20px; border-radius: 20px; border: 1px solid #1e293b; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid #1e293b; background: #000; color: #fff; box-sizing: border-box; outline: none; }
        .btn-action { width: 100%; padding: 16px; background: var(--accent); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; }

        /* Panel de Historial */
        #history-panel { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 2000; display: none; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .history-item { background: #0a1120; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #1e293b; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }

        .btn-float-container { position: fixed; bottom: 20px; right: 20px; }
        .btn-soporte { width: 55px; height: 55px; border-radius: 50%; background: var(--green); color: white; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 24px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); font-weight: bold; }

        .tracking-box { margin-top: 20px; padding: 30px; background: #0a1120; border-radius: 20px; display: none; text-align: center; border: 2px solid var(--blue-light); }
        #toast { position: fixed; bottom: 150px; left: 50%; transform: translateX(-50%); background: var(--blue-light); color: white; padding: 8px 20px; border-radius: 50px; display: none; z-index: 3000; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1 onclick="secretAdmin()">RECARGAS <span>GAMES</span></h1>
        <button class="btn-menu-top" onclick="toggleHistory()">☰</button>
    </header>

    <div id="main-content">
        <div class="game-selector">
            <button class="game-btn active" onclick="switchGame('ff', this)">FREE FIRE</button>
            <button class="game-btn" onclick="switchGame('bs', this)">BLOCK STRIKE</button>
        </div>

        <div id="section-ff">
            <div class="category-title">Diamantes</div>
            <div class="grid" id="grid-ff-diamantes"></div>
            <div class="category-title">Pases de Nivel</div>
            <div class="grid" id="grid-ff-pases-nivel"></div>
            <div class="category-title">Tarjetas y Pases</div>
            <div class="grid" id="grid-ff-tarjetas"></div>
        </div>

        <div id="section-bs" style="display:none;">
            <div class="category-title">Oro Block Strike</div>
            <div class="grid" id="grid-bs-oro"></div>
        </div>

        <div class="pago-info">
            <div class="copy-item" onclick="copyText('0102')"><span>Banco:</span> <strong>BDV (0102)</strong></div>
            <div class="copy-item" onclick="copyText('32824869')"><span>Cédula:</span> <strong>32.824.869</strong></div>
            <div class="copy-item" onclick="copyText('04228242411')"><span>Teléfono:</span> <strong>0422-8242411</strong></div>
        </div>

        <div class="form-box">
            <div style="text-align:center; margin-bottom:15px;">
                <span id="res-usd" style="color:var(--blue-light); font-weight: bold; font-size: 1.2rem;">$ 0.00</span><br>
                <span style="font-size: 1.8rem; font-weight: 900;" id="res-bs">Bs 0.00</span>
            </div>
            <input type="text" id="player-id" placeholder="ID Jugador / Usuario">
            <input type="text" id="ref-pago" placeholder="Referencia de Pago">
            <button class="btn-action" onclick="createOrder()">ENVIAR RECARGA</button>
        </div>
    </div>

    <div id="tracking-area" class="tracking-box"></div>
</div>

<div id="history-panel">
    <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 25px;">
        <h2 style="margin:0;">Mi Historial</h2>
        <button onclick="toggleHistory()" style="background:none; border:none; color:white; font-size:30px;">×</button>
    </div>
    <p style="color:gray; font-size:0.9rem;">Ingresa tu ID para ver tus pedidos:</p>
    <div style="display:flex; gap:10px; margin-bottom:20px;">
        <input type="text" id="search-id" placeholder="Tu ID de juego" style="margin:0;">
        <button onclick="buscarHistorial()" style="background:var(--blue-light); border:none; color:white; padding:0 20px; border-radius:10px; font-weight:bold;">BUSCAR</button>
    </div>
    <div id="history-list">
        </div>
</div>

<div class="btn-float-container">
    <a href="https://wa.me/584228242411" class="btn-soporte" target="_blank">W</a>
</div>

<div id="toast">Copiado</div>

<script>
    const TASA = 715;
    const firebaseConfig = {
        apiKey: "AIzaSyCGkhRz8Go1mc4EEKWfs_t7WUdPTV-ELcY",
        authDomain: "recargas-gamers-bcdaa.firebaseapp.com",
        projectId: "recargas-gamers-bcdaa",
        databaseURL: "https://recargas-gamers-bcdaa-default-rtdb.firebaseio.com/",
        storageBucket: "recargas-gamers-bcdaa.firebasestorage.app",
        messagingSenderId: "322658892724",
        appId: "1:322658892724:web:a60d1c9c1b9825f72d50e1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const TG_TOKEN = "8507458446:AAELLs-vpfikmyWFVJT7vJG7T4N0yXJ8FyY";
    const TG_CHAT = "8452807558";

    const ffDiamantes = [{n:"110💎",p:0.97},{n:"220💎",p:1.96},{n:"341💎",p:3.20},{n:"572💎",p:4.89},{n:"1166💎",p:9.00},{n:"2398💎",p:19.00},{n:"6160💎",p:48.00}];
    const ffPasesNivel = [{n:"Pase Nivel 6",p:0.32},{n:"Pase Nivel 10",p:0.65},{n:"Pase Nivel 15",p:0.65},{n:"Pase Nivel 20",p:0.65},{n:"Pase Nivel 25",p:0.65},{n:"Pase Nivel 30",p:0.95}];
    const ffTarjetas = [{n:"T. Semanal Básica",p:0.73},{n:"T. Semanal",p:2.50},{n:"T. Mensual",p:11.00},{n:"Pase Booyah",p:3.50}];
    const bsOro = [{n:"100 Oro",p:1.00},{n:"500 Oro",p:4.50},{n:"1000 Oro",p:8.00}];

    let currentGame = "Free Fire", selectedItem = "", selectedPrice = 0;

    function render(data, id) {
        const div = document.getElementById(id);
        data.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `<strong>${item.n}</strong><small>$${item.p.toFixed(2)}</small>`;
            card.onclick = () => {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedItem = item.n; selectedPrice = item.p;
                document.getElementById('res-bs').innerText = `Bs ${(selectedPrice * TASA).toLocaleString('es-VE',{minimumFractionDigits:2})}`;
                document.getElementById('res-usd').innerText = `$ ${selectedPrice.toFixed(2)}`;
            };
            div.appendChild(card);
        });
    }

    render(ffDiamantes, 'grid-ff-diamantes'); render(ffPasesNivel, 'grid-ff-pases-nivel'); render(ffTarjetas, 'grid-ff-tarjetas'); render(bsOro, 'grid-bs-oro');

    function switchGame(g, b) {
        document.querySelectorAll('.game-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active');
        currentGame = (g === 'ff') ? "Free Fire" : "Block Strike";
        document.getElementById('section-ff').style.display = (g === 'ff') ? 'block' : 'none';
        document.getElementById('section-bs').style.display = (g === 'bs') ? 'block' : 'none';
    }

    function createOrder() {
        const id = document.getElementById('player-id').value;
        const ref = document.getElementById('ref-pago').value;
        if(!id || !ref || !selectedItem) return alert("Completa los datos.");

        const orderId = "REC-" + Math.floor(Math.random() * 90000 + 10000);
        const pedido = { juego: currentGame, id, ref, item: selectedItem, status: "Pendiente", fecha: new Date().toLocaleDateString() };

        db.ref('pedidos/' + orderId).set(pedido).then(() => {
            const texto = `🔔 NUEVO PEDIDO\n\n🎮 ${currentGame}\n💎 ${selectedItem}\n👤 ID: ${id}\n🎫 Ref: ${ref}\n💵 $${selectedPrice.toFixed(2)}`;
            fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage?chat_id=${TG_CHAT}&text=${encodeURIComponent(texto)}`);
            showTracking(orderId);
        });
    }

    function showTracking(orderId) {
        document.getElementById('main-content').style.display = 'none';
        const area = document.getElementById('tracking-area');
        area.style.display = 'block';
        db.ref('pedidos/' + orderId).on('value', s => {
            const d = s.val();
            if(!d) return;
            area.innerHTML = `<h3>ESTADO</h3><div style="font-size:2.2rem; color:var(--green); font-weight:bold; margin:20px 0;">${d.status}</div><p style="color:gray;">Orden: ${orderId}</p><button onclick="location.reload()" style="background:#333; color:white; border:none; padding:10px 20px; border-radius:10px; margin-top:20px; cursor:pointer;">Volver</button>`;
        });
    }

    // FUNCIONES DEL HISTORIAL
    function toggleHistory() {
        const panel = document.getElementById('history-panel');
        panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
    }

    function buscarHistorial() {
        const idBuscado = document.getElementById('search-id').value;
        const lista = document.getElementById('history-list');
        lista.innerHTML = "<p style='text-align:center;'>Buscando...</p>";

        db.ref('pedidos').once('value', snapshot => {
            lista.innerHTML = "";
            let encontrado = false;
            snapshot.forEach(childSnapshot => {
                const pedido = childSnapshot.val();
                if(pedido.id === idBuscado) {
                    encontrado = true;
                    const color = pedido.status === "COMPLETADA" ? "#25d366" : (pedido.status === "VERIFICADO" ? "#0070f3" : "#f1c40f");
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `
                        <div style="text-align:left;">
                            <strong style="display:block;">${pedido.item}</strong>
                            <small style="color:gray;">${pedido.juego} - ${pedido.fecha || ''}</small>
                        </div>
                        <span class="status-badge" style="background:${color}; color:#000;">${pedido.status}</span>
                    `;
                    lista.appendChild(div);
                }
            });
            if(!encontrado) lista.innerHTML = "<p style='text-align:center; color:gray;'>No se encontraron pedidos con ese ID.</p>";
        });
    }

    function copyText(t) {
        navigator.clipboard.writeText(t);
        const toast = document.getElementById('toast');
        toast.style.display='block';
        setTimeout(()=> toast.style.display='none', 1500);
    }

    let clicks = 0;
    function secretAdmin() {
        clicks++;
        if(clicks === 5) window.location.href = "admin.html";
        setTimeout(() => clicks = 0, 3000);
    }
</script>

<script>
/* ========================= */
/* 🔒 CAPA PRO (AGREGADO) */

// Guardamos tu función original SIN tocarla
const originalCreateOrder = createOrder;

// Reemplazamos la función (sin modificar tu código base)
createOrder = async function () {
    const idInput = document.getElementById('player-id');
    const refInput = document.getElementById('ref-pago');

    const id = idInput.value.trim();
    const ref = refInput.value.trim();

    // quitar errores previos
    idInput.classList.remove('error');
    refInput.classList.remove('error');

    let hasError = false;

    // VALIDACIÓN PRO
    if (!id || !/^[0-9]{5,12}$/.test(id)) {
        idInput.classList.add('error');
        hasError = true;
    }

    if (!ref || ref.length < 4) {
        refInput.classList.add('error');
        hasError = true;
    }

    if (!selectedItem) {
        alert("Selecciona un producto");
        return;
    }

    if (hasError) {
        alert("Corrige los campos en rojo");
        return;
    }

    // 🔐 ENVÍO SEGURO (opcional futuro backend)
    try {
        await fetch("https://TU-SERVIDOR.com/api/pedido", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                juego: currentGame,
                id,
                ref,
                item: selectedItem,
                precio: selectedPrice
            })
        });
    } catch (e) {
        console.log("Servidor no conectado (normal si aún no lo tienes)");
    }

    // Ejecuta TU función original (NO se toca)
    originalCreateOrder();
};

// Quitar error al escribir (UX)
document.getElementById('player-id').addEventListener('input', function() {
    this.classList.remove('error');
});

document.getElementById('ref-pago').addEventListener('input', function() {
    this.classList.remove('error');
});
</script>

<style>
/* borde rojo sin cambiar diseño */
.error {

}
</style>
</body>
</html>
